<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNO Scoreboard Analyzer – Live Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --text: #e1e4ed;
      --muted: #8b8fa3;
      --accent: #6c5ce7;
      --green: #00b894;
      --orange: #fdcb6e;
      --red: #e17055;
      --blue: #74b9ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header h1 span { color: var(--accent); }
    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .status .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .game-banner {
      background: linear-gradient(135deg, var(--accent), #a29bfe);
      text-align: center;
      padding: 0.5rem;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .controls {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 2rem;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .controls button {
      background: var(--border);
      color: var(--text);
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.2s;
    }
    .controls button:hover { background: var(--accent); }
    .controls button.active { background: var(--accent); }
    #events {
      padding: 1rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .event {
      display: grid;
      grid-template-columns: 140px 110px 1fr;
      gap: 1rem;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      font-size: 0.875rem;
      line-height: 1.5;
      background: var(--card);
      border-left: 3px solid var(--border);
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .event .ts { color: var(--muted); font-family: monospace; font-size: 0.8rem; white-space: nowrap; }
    .event .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .event.game_start  { border-left-color: var(--green); }
    .event.game_reset  { border-left-color: var(--orange); }
    .event.score_update { border-left-color: var(--blue); }
    .event.insight     { border-left-color: var(--accent); }
    .event.error       { border-left-color: var(--red); }
    .badge.game_start  { background: rgba(0,184,148,0.15); color: var(--green); }
    .badge.game_reset  { background: rgba(253,203,110,0.15); color: var(--orange); }
    .badge.score_update { background: rgba(116,185,255,0.15); color: var(--blue); }
    .badge.time_update { background: rgba(139,143,163,0.15); color: var(--muted); }
    .badge.team_change { background: rgba(253,203,110,0.15); color: var(--orange); }
    .badge.insight     { background: rgba(108,92,231,0.15); color: var(--accent); }
    .badge.error       { background: rgba(225,112,85,0.15); color: var(--red); }
    .badge.info        { background: rgba(139,143,163,0.15); color: var(--muted); }
    .event .msg { word-break: break-word; }
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    .empty-state p { margin-top: 0.5rem; font-size: 0.9rem; }
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>🎯 <span>UNO</span> Scoreboard Analyzer</h1>
    <div class="status">
      <div class="dot"></div>
      <span id="statusText">Connecting…</span>
    </div>
  </header>
  <div class="game-banner" id="gameBanner">Game #1</div>
  <div class="controls">
    <button class="active" id="btnAll" onclick="setFilter(null)">All Events</button>
    <button id="btnInsights" onclick="setFilter('insight')">💡 Insights Only</button>
    <button id="btnScores" onclick="setFilter('score_update')">📊 Score Updates</button>
    <button id="btnCurrentGame" onclick="filterCurrentGame()">🎮 Current Game</button>
  </div>
  <div id="events">
    <div class="empty-state" id="emptyState">
      <p style="font-size:2rem;">⏳</p>
      <p>Waiting for scoreboard events…</p>
    </div>
  </div>
  <footer>Auto-refreshes every 3 seconds</footer>

  <script>
    let allEvents = [];
    let lastIndex = 0;
    let filterType = null;
    let filterGame = null;
    let currentGameNumber = 1;
    let renderedCount = 0;       // tracks how many filtered events are already in the DOM
    let lastFilterKey = '';       // tracks the active filter so we know when to full-rebuild

    const LABELS = {
      game_start: '🏁 Game Start',
      game_reset: '🔄 New Game',
      score_update: '📊 Score',
      time_update: '⏱ Time',
      team_change: '🔀 Teams',
      insight: '💡 Insight',
      error: '❌ Error',
      info: 'ℹ️ Info',
    };

    function currentFilterKey() {
      return `${filterType || ''}|${filterGame || ''}`;
    }

    function setFilter(type) {
      filterType = type;
      filterGame = null;
      forceRender();
      document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
      if (!type) document.getElementById('btnAll').classList.add('active');
      else if (type === 'insight') document.getElementById('btnInsights').classList.add('active');
      else if (type === 'score_update') document.getElementById('btnScores').classList.add('active');
    }

    function filterCurrentGame() {
      filterType = null;
      filterGame = currentGameNumber;
      forceRender();
      document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
      document.getElementById('btnCurrentGame').classList.add('active');
    }

    function getFiltered() {
      let filtered = allEvents;
      if (filterType) filtered = filtered.filter(e => e.type === filterType);
      if (filterGame) filtered = filtered.filter(e => e.game_number === filterGame);
      return filtered;
    }

    function buildEventHtml(e) {
      return `<div class="event ${e.type}">` +
        `<span class="ts">${e.timestamp}</span>` +
        `<span class="badge ${e.type}">${LABELS[e.type] || e.type}</span>` +
        `<span class="msg">${escapeHtml(e.message)}</span>` +
        `</div>`;
    }

    /** Full DOM rebuild — used when filters change. */
    function forceRender() {
      lastFilterKey = currentFilterKey();
      renderedCount = 0;
      const container = document.getElementById('events');
      container.innerHTML = '';
      appendNewEvents();
    }

    /** Only append events that haven't been rendered yet. */
    function appendNewEvents() {
      const fk = currentFilterKey();
      if (fk !== lastFilterKey) { forceRender(); return; }

      const container = document.getElementById('events');
      const filtered = getFiltered();

      if (filtered.length === 0 && renderedCount === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p style="font-size:2rem;">⏳</p>
            <p>Waiting for scoreboard events…</p>
          </div>`;
        return;
      }

      // Remove empty-state placeholder if present and we now have events
      if (renderedCount === 0 && filtered.length > 0) {
        container.innerHTML = '';
      }

      const newEvents = filtered.slice(renderedCount);
      if (newEvents.length === 0) return;

      const fragment = document.createDocumentFragment();
      const temp = document.createElement('div');
      for (const e of newEvents) {
        temp.innerHTML = buildEventHtml(e);
        fragment.appendChild(temp.firstChild);
      }
      container.appendChild(fragment);
      renderedCount = filtered.length;

      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    async function poll() {
      let data;
      try {
        const resp = await fetch(`/api/events?since=${lastIndex}&_t=${Date.now()}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        data = await resp.json();
      } catch (err) {
        console.error('Poll fetch error:', err);
        document.getElementById('statusText').textContent = 'Connection lost – retrying…';
        return;
      }

      try {
        if (data.events && data.events.length > 0) {
          allEvents = allEvents.concat(data.events);
          lastIndex = data.total;
        }
        currentGameNumber = data.game_number || 1;
        document.getElementById('gameBanner').textContent = `Game #${currentGameNumber}`;
        document.getElementById('statusText').textContent =
          `Live · ${allEvents.length} events · Game #${currentGameNumber}`;
        appendNewEvents();
      } catch (err) {
        console.error('Render error:', err);
      }
    }

    setInterval(poll, 3000);
    poll();
  </script>
</body>
</html>
